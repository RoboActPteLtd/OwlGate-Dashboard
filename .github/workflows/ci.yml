name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Minimal while the dashboard is a scaffold: validate the manifest and that the
# declared dependency tree resolves. Build gets added once the SvelteKit app is
# fleshed out.
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('package.json OK')"
      - name: Resolve dependency tree
        run: npm install --package-lock-only --no-audit --no-fund --legacy-peer-deps

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (secret scan)
        run: |
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner --redact
